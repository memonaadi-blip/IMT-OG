<style>
  :root{
    --ink:#15171c;--panel:#1d2027;--paper:#f6f4ef;--card:#ffffff;--line:#e3ded3;
    --line-dk:#2b2f38;--muted:#6b6f78;--muted-dk:#9aa0ab;--gold:#c1872c;--gold-soft:#f0e2c6;
    --conn:#cdbf9e;--shadow:0 1px 2px rgba(20,23,28,.06),0 8px 22px rgba(20,23,28,.07);--radius:11px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}

  /* header */
  header{display:flex;align-items:center;gap:20px;padding:13px 22px;background:var(--ink);color:#fff;flex:none}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand h1{font-family:"Space Grotesk";font-weight:700;font-size:19px;letter-spacing:-.02em;margin:0}
  .brand .tag{font-size:12px;color:var(--muted-dk)}
  .hstats{display:flex;gap:24px;margin-left:6px}
  .hstat{display:flex;flex-direction:column;line-height:1.1}
  .hstat b{font-family:"Space Grotesk";font-size:17px;font-weight:600}
  .hstat span{font-size:10.5px;color:var(--muted-dk);text-transform:uppercase;letter-spacing:.06em}
  .htools{margin-left:auto;display:flex;gap:9px;align-items:center}
  .searchwrap{position:relative}
  .searchwrap input{font:inherit;font-size:13px;padding:8px 13px 8px 32px;border:1px solid var(--line-dk);
    border-radius:8px;background:#262a32;width:230px;color:#fff}
  .searchwrap input::placeholder{color:var(--muted-dk)}
  .searchwrap input:focus{outline:2px solid #3c424d;border-color:#3c424d}
  .searchwrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted-dk)}
  .btn{font:inherit;font-size:13px;font-weight:500;border:1px solid var(--line-dk);background:#262a32;color:#fff;
    padding:8px 13px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
  .btn:hover{background:#30353f}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#1a140a}
  .btn.gold:hover{background:#d2962f}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* breadcrumb */
  .crumbs{display:flex;align-items:center;gap:6px;padding:11px 24px;background:var(--paper);
    border-bottom:1px solid var(--line);flex:none;flex-wrap:wrap;font-size:13px}
  .crumbs a{color:var(--muted);text-decoration:none;cursor:pointer;padding:3px 9px;border-radius:7px;font-weight:500}
  .crumbs a:hover{background:#ece7dc;color:var(--ink)}
  .crumbs a.here{color:var(--ink);font-weight:600;background:#ece7dc}
  .crumbs .sep{color:var(--conn)}

  /* stage */
  .stage{flex:1;overflow:auto;padding:30px 24px 60px;min-height:0}
  .tree{display:flex;flex-direction:column;align-items:center;min-width:min-content}

  /* apex / parent node */
  .node{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:13px 18px;text-align:center;position:relative;min-width:210px;max-width:340px}
  .node.apex{border-color:var(--gold);border-width:1.5px;background:linear-gradient(180deg,#fffdf8,#fff)}
  .node .role-eyebrow{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .node .nm{font-family:"Space Grotesk";font-weight:600;font-size:17px;letter-spacing:-.01em;margin-top:2px}
  .node .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .node .hc{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:12px;color:var(--ink);
    background:var(--gold-soft);border-radius:20px;padding:3px 11px;font-weight:500}

  /* connector stack */
  .down{width:2px;height:26px;background:var(--conn)}
  .children{display:flex;gap:18px;align-items:flex-start;position:relative;padding-top:26px}
  .children::before{content:"";position:absolute;top:0;left:var(--l,0);right:var(--r,0);height:2px;background:var(--conn)}
  .child{display:flex;flex-direction:column;align-items:center;position:relative}
  .child::before{content:"";position:absolute;top:-26px;height:26px;width:2px;background:var(--conn)}
  /* single child: straight line, hide horizontal bar */
  .children.single::before{display:none}

  /* group box (department / section) */
  .box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:13px 15px;min-width:190px;max-width:230px;cursor:pointer;transition:.14s;text-align:left;position:relative}
  .box:hover{border-color:var(--conn);transform:translateY(-2px);box-shadow:0 4px 10px rgba(20,23,28,.08),0 12px 28px rgba(20,23,28,.09)}
  .box .swatch{width:30px;height:6px;border-radius:4px;margin-bottom:9px}
  .box .bname{font-family:"Space Grotesk";font-weight:600;font-size:14.5px;letter-spacing:-.01em;line-height:1.25}
  .box .lead{font-size:11.5px;color:var(--muted);margin-top:7px;display:flex;flex-direction:column;gap:1px}
  .box .lead b{color:var(--ink);font-weight:600}
  .box .foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;border-top:1px solid var(--line);padding-top:9px}
  .box .cnt{font-family:"Space Grotesk";font-weight:600;font-size:13px}
  .box .cnt span{color:var(--muted);font-weight:400;font-size:11.5px}
  .box .go{font-size:11px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:3px}
  .box.flash{animation:flash 1s ease}
  @keyframes flash{0%{background:#fcf3e0;border-color:var(--gold)}100%{background:#fff;border-color:var(--line)}}
  .box.drop{outline:2px dashed var(--gold);outline-offset:2px}

  /* employee leaf cards */
  .emps{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:11px;width:100%;max-width:1180px;padding-top:4px}
  .ecard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;
    box-shadow:var(--shadow);position:relative;cursor:grab;transition:.12s}
  .ecard:hover{border-color:var(--conn)}
  .ecard:active{cursor:grabbing}
  .ecard.dragging{opacity:.4}
  .ecard.lead{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-soft),var(--shadow)}
  .ecard.hl{animation:hl 1.6s ease}
  @keyframes hl{0%,40%{box-shadow:0 0 0 3px var(--gold)}100%{box-shadow:var(--shadow)}}
  .ecard .top{display:flex;gap:11px;align-items:flex-start}
  .av{width:38px;height:38px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;
    font-family:"Space Grotesk";font-weight:600;font-size:14px;color:#fff}
  .ec-name{font-weight:600;font-size:14px}
  .ec-pos{font-size:12.5px;color:var(--muted);margin-top:1px}
  .ec-id{position:absolute;top:11px;right:13px;font-family:"Space Grotesk";font-size:11px;color:#b7ad97;font-weight:500}
  .leadtag,.movedtag{font-size:10px;font-weight:700;letter-spacing:.04em;border-radius:5px;padding:1px 6px;margin-left:7px;text-transform:uppercase}
  .leadtag{color:#7a5212;background:var(--gold-soft)}
  .movedtag{color:var(--gold);border:1px solid var(--gold)}
  .ec-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .chip{font-size:11px;color:#54585f;background:#f1ede4;border:1px solid var(--line);padding:2px 8px;border-radius:6px}
  .moverow{margin-top:10px;display:flex;align-items:center;gap:8px;border-top:1px dashed var(--line);padding-top:9px}
  .moverow label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .moverow select{font:inherit;font-size:12.5px;padding:5px 7px;border:1px solid var(--line);border-radius:7px;background:var(--paper);flex:1;color:var(--ink);max-width:160px}
  .grouphdr{width:100%;max-width:1180px;display:flex;align-items:center;gap:10px;margin:2px 0 4px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.07em}
  .grouphdr::after{content:"";flex:1;height:1px;background:var(--line)}

  /* search overlay */
  .results{position:absolute;top:54px;right:22px;width:340px;max-height:60vh;overflow:auto;background:var(--card);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 40px rgba(20,23,28,.18);z-index:40;display:none}
  .results.show{display:block}
  .res{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:10px;align-items:center}
  .res:last-child{border-bottom:none}
  .res:hover{background:#faf7f0}
  .res .rn{font-weight:600;font-size:13px}
  .res .rp{font-size:11.5px;color:var(--muted)}
  .res .rpath{font-size:10.5px;color:var(--gold);margin-top:1px;font-weight:600}
  .res .ravatar{width:30px;height:30px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Space Grotesk";font-weight:600;font-size:12px}
  .res-empty{padding:18px 14px;color:var(--muted);font-size:13px}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);
    color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);transition:.25s;pointer-events:none;z-index:60;display:flex;gap:10px;align-items:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}

  @media (max-width:760px){.hstats{display:none}.searchwrap input{width:140px}.brand .tag{display:none}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

let EMP = ORIGINAL.map((e,i)=>({...e,_id:i,_orig:e.department,_moved:false}));
let focus = {level:'root'};        // {level:'root'} | {level:'dept',dept} | {level:'sect',dept,sect}
let moveCount = 0;

const $=s=>document.querySelector(s);
const norm=s=>(s||'').toString().toLowerCase();
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function depHue(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%360;return h;}
function depColor(n,l=46,s=52){return`hsl(${depHue(n)} ${s}% ${l}%)`;}
function initials(n){const p=n.trim().split(/\s+/);return(((p[0]||'')[0]||'')+((p[1]||'')[0]||'')).toUpperCase();}

/* ---- seniority ranking (lower = more senior) ---- */
const RANKS=[
  [0,/chairman/],[1,/chief|\bceo\b|founder|president/],
  [2,/director|head of|\bhead\b|board|senior general manager|\bsgm\b/],
  [4,/deputy general manager|\bdgm\b/],[3,/general manager|\bgm\b|zonal head|regional head/],
  [5,/senior manager/],[7,/deputy manager|assistant manager|\bam\b|asst/],
  [6,/manager/],[8,/\blead\b|qualifier/],[9,/senior /],
  [10,/executive|engineer|officer|advisor|consultant|architect|analyst|specialist|coordinator|designer|relationship/],
  [11,/supervisor/],[12,/technician|operator|draftsman|visualizer|controller/],
  [13,/electrician|plumber|welder|painter|carpenter|mason|fabricator|gardener|horticulture/],
  [14,/driver|rider|cook|janitor|helper|office boy|security|guard|store keeper|lift|front desk|peon/],
  [15,/intern/]
];
function rank(pos){const p=norm(pos);for(const[r,re]of RANKS)if(re.test(p))return r;return 50;}
function bySeniority(a,b){const r=rank(a.position)-rank(b.position);return r||a.name.localeCompare(b.name);}

/* ---- aggregations ---- */
function inDept(d){return EMP.filter(e=>e.department===d);}
function inSect(d,s){return EMP.filter(e=>e.department===d&&e.section===s);}
function departments(){const m=new Map();for(const e of EMP)m.set(e.department,(m.get(e.department)||0)+1);
  return[...m.entries()].sort((a,b)=>b[1]-a[1]);}
function sections(d){const m=new Map();for(const e of inDept(d))m.set(e.section,(m.get(e.section)||0)+1);
  return[...m.entries()].sort((a,b)=>b[1]-a[1]);}
function leadOf(list){return list.slice().sort(bySeniority)[0];}
function topPerson(){return EMP.slice().sort(bySeniority)[0];}

/* ---- header stats ---- */
function stats(){$('#s-emp').textContent=EMP.length;$('#s-dep').textContent=departments().length;$('#s-moves').textContent=moveCount;}

/* ---- breadcrumb ---- */
function renderCrumbs(){
  const c=$('#crumbs');const parts=[`<a data-go="root" class="${focus.level==='root'?'here':''}">Evoke</a>`];
  if(focus.dept)parts.push(`<span class="sep">›</span><a data-go="dept" class="${focus.level==='dept'?'here':''}">${esc(focus.dept)}</a>`);
  if(focus.sect)parts.push(`<span class="sep">›</span><a data-go="sect" class="here">${esc(focus.sect)}</a>`);
  c.innerHTML=parts.join('');
  c.querySelectorAll('a').forEach(a=>a.onclick=()=>{
    const g=a.dataset.go;
    if(g==='root')focus={level:'root'};
    else if(g==='dept')focus={level:'dept',dept:focus.dept};
    render();
  });
}

/* ---- node builders ---- */
function apexNode(){
  const t=topPerson();
  return `<div class="node apex">
    <div class="role-eyebrow">${esc(t.position)}</div>
    <div class="nm">${esc(t.name)}</div>
    <div class="sub">${esc(t.department)} · ${esc(t.company)}</div>
    <div class="hc">▦ ${EMP.length.toLocaleString()} employees · ${departments().length} departments</div>
  </div>`;
}
function parentHeader(title,sub,count){
  return `<div class="node">
    <div class="role-eyebrow">${esc(sub)}</div>
    <div class="nm">${esc(title)}</div>
    <div class="hc">▦ ${count.toLocaleString()} ${count===1?'person':'people'}</div>
  </div>`;
}
function groupBox(name,count,lead,kind){
  const col=depColor(name);
  return `<div class="box" data-name="${esc(name)}" data-kind="${kind}">
    <div class="swatch" style="background:${col}"></div>
    <div class="bname">${esc(name)}</div>
    ${lead?`<div class="lead">${kind==='dept'?'Lead':'Senior'}: <b>${esc(lead.name)}</b><span>${esc(lead.position)}</span></div>`:''}
    <div class="foot"><div class="cnt">${count} <span>${count===1?'person':'people'}</span></div>
    <div class="go">open ›</div></div>
  </div>`;
}
function childWrap(inner){return `<div class="child">${inner}</div>`;}
function childrenRow(arr){
  const cls='children'+(arr.length===1?' single':'');
  return `<div class="${cls}">${arr.map(childWrap).join('')}</div>`;
}

/* ---- main render ---- */
function render(){
  stats();renderCrumbs();
  const tree=$('#tree');
  if(focus.level==='root'){
    const deps=departments();
    const boxes=deps.map(([d,ct])=>groupBox(d,ct,leadOf(inDept(d)),'dept'));
    tree.innerHTML=apexNode()+`<div class="down"></div>`+childrenRow(boxes);
    wireBoxes('dept');adjustBar();
  }else if(focus.level==='dept'){
    const d=focus.dept;const secs=sections(d);
    const boxes=secs.map(([s,ct])=>groupBox(s,ct,leadOf(inSect(d,s)),'sect'));
    tree.innerHTML=parentHeader(d,'Department',inDept(d).length)+`<div class="down"></div>`+childrenRow(boxes);
    wireBoxes('sect');adjustBar();
  }else{
    const d=focus.dept,s=focus.sect;
    const list=inSect(d,s).sort(bySeniority);
    const lead=list[0];
    tree.innerHTML=parentHeader(s,d,list.length)+`<div class="down"></div>`+
      `<div class="grouphdr">People · senior first</div>`+
      `<div class="emps">${list.map((e,i)=>empCard(e,i===0&&list.length>1)).join('')}</div>`;
    wireCards();
  }
}

/* center the horizontal connector bar over first..last child */
function adjustBar(){
  const row=$('.children');if(!row||row.classList.contains('single'))return;
  const kids=row.querySelectorAll('.child');if(kids.length<2)return;
  const rB=row.getBoundingClientRect();
  const first=kids[0].getBoundingClientRect(),last=kids[kids.length-1].getBoundingClientRect();
  const l=(first.left+first.width/2)-rB.left;
  const r=rB.right-(last.left+last.width/2);
  row.style.setProperty('--l',l+'px');row.style.setProperty('--r',r+'px');
}
window.addEventListener('resize',()=>{if(focus.level!=='sect')adjustBar();});

function empCard(e,isLead){
  const deps=departments().map(d=>d[0]);
  const opts=deps.filter(d=>d!==e.department).map(d=>`<option value="${esc(d)}">${esc(d)}</option>`).join('');
  return `<div class="ecard${isLead?' lead':''}" draggable="true" data-id="${e._id}">
    <span class="ec-id">#${esc(e.emp_no)}</span>
    <div class="top">
      <div class="av" style="background:${depColor(e.department,42,55)}">${esc(initials(e.name))}</div>
      <div style="min-width:0">
        <div class="ec-name">${esc(e.name)}${isLead?'<span class="leadtag">Lead</span>':''}${e._moved?'<span class="movedtag">moved</span>':''}</div>
        <div class="ec-pos">${esc(e.position)}</div>
      </div>
    </div>
    <div class="ec-meta"><span class="chip">${esc(e.business_area)}</span><span class="chip">${esc(e.company)}</span></div>
    <div class="moverow"><label>Move to</label>
      <select data-id="${e._id}"><option value="">Department…</option>${opts}</select></div>
  </div>`;
}

/* ---- wiring ---- */
function wireBoxes(kind){
  document.querySelectorAll('.box').forEach(b=>{
    const name=b.dataset.name;
    b.onclick=()=>{
      if(kind==='dept')focus={level:'dept',dept:name};
      else focus={level:'sect',dept:focus.dept,sect:name};
      render();$('.stage').scrollTop=0;
    };
    if(kind==='dept'){ // departments are drop targets for reassignment
      b.ondragover=ev=>{ev.preventDefault();b.classList.add('drop');};
      b.ondragleave=()=>b.classList.remove('drop');
      b.ondrop=ev=>{ev.preventDefault();b.classList.remove('drop');
        moveEmp(+ev.dataTransfer.getData('text/plain'),name);};
    }
  });
}
function wireCards(){
  document.querySelectorAll('.ecard').forEach(c=>{
    const id=+c.dataset.id;
    c.ondragstart=ev=>{ev.dataTransfer.setData('text/plain',id);ev.dataTransfer.effectAllowed='move';c.classList.add('dragging');};
    c.ondragend=()=>c.classList.remove('dragging');
  });
  document.querySelectorAll('.ecard select').forEach(sel=>{
    sel.onchange=()=>{if(sel.value)moveEmp(+sel.dataset.id,sel.value);};
  });
}

/* ---- move ---- */
function moveEmp(id,toDep){
  const e=EMP.find(x=>x._id===id);if(!e||e.department===toDep)return;
  const from=e.department;e.department=toDep;e._moved=(e.department!==e._orig);
  moveCount++;$('#reset').disabled=false;
  toast(`${e.name} → ${toDep}`,`from ${from}`);
  render();
  // flash destination box if visible
  const box=document.querySelector(`.box[data-name="${cssEsc(toDep)}"]`);
  if(box){box.classList.remove('flash');void box.offsetWidth;box.classList.add('flash');}
}
function cssEsc(s){return String(s).replace(/["\\]/g,'\\$&');}

/* ---- search ---- */
const results=$('#results');
$('#search').oninput=function(){
  const q=norm(this.value).trim();
  if(!q){results.classList.remove('show');return;}
  const hits=EMP.filter(e=>norm(e.name).includes(q)||norm(e.position).includes(q)||
    norm(e.section).includes(q)||norm(e.emp_no).includes(q)).slice(0,40);
  if(!hits.length){results.innerHTML=`<div class="res-empty">No one matches “${esc(this.value)}”.</div>`;results.classList.add('show');return;}
  results.innerHTML=hits.map(e=>`<div class="res" data-id="${e._id}">
    <div class="ravatar" style="background:${depColor(e.department,42,55)}">${esc(initials(e.name))}</div>
    <div style="min-width:0"><div class="rn">${esc(e.name)}</div><div class="rp">${esc(e.position)}</div>
    <div class="rpath">${esc(e.department)} › ${esc(e.section)}</div></div></div>`).join('');
  results.classList.add('show');
  results.querySelectorAll('.res').forEach(r=>r.onclick=()=>{
    const e=EMP.find(x=>x._id===+r.dataset.id);
    focus={level:'sect',dept:e.department,sect:e.section};
    results.classList.remove('show');$('#search').value='';render();$('.stage').scrollTop=0;
    setTimeout(()=>{const card=document.querySelector(`.ecard[data-id="${e._id}"]`);
      if(card){card.scrollIntoView({block:'center',behavior:'smooth'});card.classList.add('hl');}},60);
  });
};
document.addEventListener('click',ev=>{if(!ev.target.closest('.results')&&!ev.target.closest('.searchwrap'))results.classList.remove('show');});

/* ---- export / reset ---- */
function csvCell(v){v=(v==null?'':String(v));return /[",\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
$('#export').onclick=()=>{
  const cols=['Emp No.','Employee Name','Position','Department','Section','Business Area','Company'];
  const rows=EMP.map(e=>[e.emp_no,e.name,e.position,e.department,e.section,e.business_area,e.company]);
  const csv=[cols,...rows].map(r=>r.map(csvCell).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='Evoke_Org_updated.csv';a.click();URL.revokeObjectURL(a.href);
  toast('CSV exported',`${EMP.length} rows · ${moveCount} move${moveCount===1?'':'s'}`);
};
$('#reset').onclick=()=>{
  EMP=ORIGINAL.map((e,i)=>({...e,_id:i,_orig:e.department,_moved:false}));
  moveCount=0;$('#reset').disabled=true;toast('Reset complete','Original hierarchy restored');render();
};

let toastT;function toast(m,sub){$('#toast-msg').innerHTML=esc(m)+(sub?` <span style="color:var(--muted-dk)">· ${esc(sub)}</span>`:'');
  const t=$('#toast');t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}

render();
</script>
